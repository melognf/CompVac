<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F4F5F7"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#C81E1E"/>
    </linearGradient>
    <linearGradient id="black" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
  </defs>

  <!-- ─── Fondo cuadrado redondeado ─── -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- ─── Anillos del binding ─── -->
  <rect x="184" y="115" width="20" height="58" rx="10" fill="url(#black)"/>
  <rect x="308" y="115" width="20" height="58" rx="10" fill="url(#black)"/>

  <!-- ─── Cuerpo del calendario (centrado, con padding) ─── -->
  <rect x="95" y="150" width="322" height="305" rx="26" ry="26"
        fill="#FFFFFF" stroke="url(#black)" stroke-width="9"/>

  <!-- ─── Header rojo ─── -->
  <path d="M 100 200 L 412 200 L 412 174 Q 412 163 401 163 L 111 163 Q 100 163 100 174 Z" fill="url(#red)"/>

  <!-- ─── Grilla 4x5 (sutil) ─── -->
  <g stroke="#0a0a0a" stroke-width="2" opacity="0.15">
    <!-- Horizontales (entre filas) -->
    <line x1="95" y1="252" x2="417" y2="252"/>
    <line x1="95" y1="302" x2="417" y2="302"/>
    <line x1="95" y1="352" x2="417" y2="352"/>
    <line x1="95" y1="402" x2="417" y2="402"/>
    <!-- Verticales (entre columnas) -->
    <line x1="175" y1="207" x2="175" y2="455"/>
    <line x1="256" y1="207" x2="256" y2="455"/>
    <line x1="337" y1="207" x2="337" y2="455"/>
  </g>

  <!-- ─── Puntitos en cada celda (días) ─── -->
  <g fill="#0a0a0a" opacity="0.40">
    <!-- Fila 1 -->
    <circle cx="135" cy="227" r="4"/><circle cx="216" cy="227" r="4"/><circle cx="296" cy="227" r="4"/><circle cx="377" cy="227" r="4"/>
    <!-- Fila 2 -->
    <circle cx="135" cy="277" r="4"/><circle cx="216" cy="277" r="4"/><circle cx="296" cy="277" r="4"/><circle cx="377" cy="277" r="4"/>
    <!-- Fila 3 (celda del avión sin punto) -->
    <circle cx="135" cy="327" r="4"/><circle cx="216" cy="327" r="4"/><circle cx="377" cy="327" r="4"/>
    <!-- Fila 4 -->
    <circle cx="135" cy="377" r="4"/><circle cx="216" cy="377" r="4"/><circle cx="296" cy="377" r="4"/><circle cx="377" cy="377" r="4"/>
    <!-- Fila 5 -->
    <circle cx="135" cy="427" r="4"/><circle cx="216" cy="427" r="4"/><circle cx="296" cy="427" r="4"/><circle cx="377" cy="427" r="4"/>
  </g>

  <!-- ─── Avión despegando en la celda destacada ─── -->
  <g transform="translate(296 327) rotate(-30)">
    <!-- Estela sutil -->
    <g stroke="url(#red)" stroke-width="3" stroke-linecap="round" opacity="0.4">
      <line x1="0" y1="30" x2="0" y2="40"/>
      <line x1="0" y1="46" x2="0" y2="55"/>
    </g>
    <!-- Cuerpo del avión -->
    <path d="
      M -4 -30
      Q 0 -34 4 -30
      L 5 -8
      L 30 5
      L 30 11
      L 5 6
      L 5 17
      L 14 23
      L 14 27
      L 0 23
      L -14 27
      L -14 23
      L -5 17
      L -5 6
      L -30 11
      L -30 5
      L -5 -8
      Z
    " fill="url(#red)"/>
  </g>
</svg>
