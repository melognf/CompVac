<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F2F3F5"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#C81E1E"/>
    </linearGradient>
  </defs>

  <!-- Fondo blanco -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- ─────────── CALENDARIO ─────────── -->
  <!-- Anillos de binding -->
  <rect x="160" y="75" width="20" height="58" rx="10" fill="#0A0A0A"/>
  <rect x="332" y="75" width="20" height="58" rx="10" fill="#0A0A0A"/>

  <!-- Cuerpo principal del calendario (borde negro grueso, fondo blanco) -->
  <rect x="62" y="100" width="388" height="372" rx="28" ry="28" fill="#FFFFFF" stroke="#0A0A0A" stroke-width="10"/>

  <!-- Banda roja arriba (header del mes) -->
  <path d="M 67 168 L 445 168 L 445 128 Q 445 105 422 105 L 90 105 Q 67 105 67 128 Z" fill="url(#red)"/>

  <!-- ─────────── GRID DE DÍAS (claramente visible) ─────────── -->
  <!-- Líneas horizontales -->
  <g stroke="#0A0A0A" stroke-width="3" opacity="0.18">
    <line x1="62" y1="240" x2="450" y2="240"/>
    <line x1="62" y1="305" x2="450" y2="305"/>
    <line x1="62" y1="370" x2="450" y2="370"/>
    <line x1="62" y1="435" x2="450" y2="435"/>
    <!-- Verticales -->
    <line x1="159" y1="175" x2="159" y2="472"/>
    <line x1="256" y1="175" x2="256" y2="472"/>
    <line x1="353" y1="175" x2="353" y2="472"/>
  </g>

  <!-- Pequeños puntitos negros = días normales en cada celda -->
  <g fill="#0A0A0A" opacity="0.40">
    <!-- fila 1 (debajo del header) -->
    <circle cx="110" cy="207" r="5"/><circle cx="207" cy="207" r="5"/><circle cx="305" cy="207" r="5"/><circle cx="402" cy="207" r="5"/>
    <!-- fila 2 -->
    <circle cx="110" cy="272" r="5"/><circle cx="207" cy="272" r="5"/><circle cx="305" cy="272" r="5"/><circle cx="402" cy="272" r="5"/>
    <!-- fila 3: la celda central (256,337) tendrá el sol → resto sí -->
    <circle cx="110" cy="337" r="5"/><circle cx="207" cy="337" r="5"/><circle cx="402" cy="337" r="5"/>
    <!-- fila 4 -->
    <circle cx="110" cy="402" r="5"/><circle cx="207" cy="402" r="5"/><circle cx="305" cy="402" r="5"/><circle cx="402" cy="402" r="5"/>
    <!-- fila 5 -->
    <circle cx="110" cy="453" r="5"/><circle cx="207" cy="453" r="5"/><circle cx="305" cy="453" r="5"/><circle cx="402" cy="453" r="5"/>
  </g>

  <!-- ─────────── AVIÓN DESPEGANDO en la celda destacada ─────────── -->
  <g transform="translate(290 350) rotate(-35)">
    <!-- Estela / trail detrás del avión (sugiere movimiento/despegue) -->
    <g stroke="url(#red)" stroke-width="4" stroke-linecap="round" opacity="0.45">
      <line x1="0" y1="38"  x2="0" y2="50"/>
      <line x1="0" y1="58"  x2="0" y2="68"/>
    </g>
    <!-- Cuerpo del avión (silueta vista desde arriba, inclinada hacia arriba-derecha) -->
    <path d="
      M -5 -38
      Q 0 -42 5 -38
      L 6 -10
      L 38 6
      L 38 13
      L 6 8
      L 6 22
      L 18 30
      L 18 34
      L 0 30
      L -18 34
      L -18 30
      L -6 22
      L -6 8
      L -38 13
      L -38 6
      L -6 -10
      Z
    " fill="url(#red)"/>
  </g>
</svg>
